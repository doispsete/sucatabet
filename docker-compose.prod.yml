services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    # O postgres pode manter environment para clareza dos mapeamentos base
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sucatabet_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # A senha não deve conter caracteres especiais (/, +, =). Use: openssl rand -hex 32
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sucatabet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sucatabet-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: sucatabet-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sucatabet.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - sucatabet-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sucatabet-api
    env_file: .env
    environment:
      # DATABASE_URL e outros secrets já vêm do .env via env_file
      PORT: 3006
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sucatabet-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: sucatabet-web
    env_file: .env
    environment:
      # Secrets como NEXTAUTH_SECRET já vêm do .env via env_file
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - sucatabet-network

  nginx:
    image: nginx:alpine
    container_name: sucatabet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - sucatabet-network

networks:
  sucatabet-network:
    driver: bridge

volumes:
  postgres_data:
