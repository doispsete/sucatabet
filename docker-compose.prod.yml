services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    mem_limit: 768m
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sucatabet_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sucatabet_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sucatabet-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: sucatabet-pgadmin
    mem_limit: 512m
    cpus: 0.25
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sucatabet.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - sucatabet-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sucatabet-api
    mem_limit: 768m
    cpus: 1.0
    env_file: .env
    environment:
      PORT: 3006
      NODE_ENV: production
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sucatabet-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: sucatabet-web
    mem_limit: 512m
    cpus: 0.5
    env_file: .env
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - sucatabet-network

  nginx:
    image: nginx:alpine
    container_name: sucatabet-nginx
    mem_limit: 128m
    cpus: 0.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - sucatabet-network

networks:
  sucatabet-network:
    driver: bridge

volumes:
  postgres_data:
