services:
  postgres:
    image: postgres:16-alpine
    container_name: sucatabet-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sucatabet_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sucatabet_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sucatabet-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sucatabet-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-sucatabet_db}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-8h}
      PORT: 3006
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sucatabet-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: sucatabet-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: production
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - sucatabet-network

  nginx:
    image: nginx:alpine
    container_name: sucatabet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - sucatabet-network

networks:
  sucatabet-network:
    driver: bridge

volumes:
  postgres_data:
