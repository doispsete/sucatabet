user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip Configuration
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;

    # Upstreams
    upstream api_server {
        server api:3006;
    }

    upstream web_server {
        server web:3000;
    }

    # PORTA 80 - MODO INICIAL (HTTP)
    # Este bloco serve o conteúdo via HTTP inicialmente para permitir o deploy e o Certbot.
    server {
        listen 80;
        # ABAIXO: Substitua 'seudominio.com www.seudominio.com' pelo seu domínio real
        server_name sucatabet.com.br www.sucatabet.com.br; 

        # Rota obrigatória para validação do Certbot (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # --- MODO 1: ANTES DO SSL (Descomente os proxies abaixo para rodar em HTTP) ---
        
        # API Proxy
        # location /api/ {
        #     limit_req zone=api_limit burst=20 nodelay;
        #     proxy_pass http://api_server;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_read_timeout 60s;
        # }

        # Web Proxy
        # location / {
        #     proxy_pass http://web_server;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # --- MODO 2: APÓS SSL (Comente os proxies acima e DESCOMENTE a linha abaixo) ---
        return 301 https://$host$request_uri;
    }

    # PORTA 443 - MODO FINAL (HTTPS)
    # Este bloco deve ser descomentado apenas APÓS rodar o Certbot com sucesso.
    
    server {
        listen 443 ssl;
        server_name sucatabet.com.br www.sucatabet.com.br;

        # Configuração SSL
        ssl_certificate /etc/letsencrypt/live/sucatabet.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sucatabet.com.br/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Headers de segurança
        add_header HSTS "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10m;

        # Bloqueia acesso a arquivos sensíveis
        location ~ /\.(env|git|ht) {
            deny all;
        }

        # API Reverse Proxy
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            # Rate Limit específico para Auth
            location ~ /api/auth {
                limit_req zone=login_limit burst=5 nodelay;
                proxy_pass http://api_server;
            }

            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Web Reverse Proxy
        location / {
            proxy_pass http://web_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
